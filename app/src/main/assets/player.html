<script>
'use strict';
var hlsPlayer=null,shakaPlayer=null,plyrPlayer=null,playerContainer=null,videoElement=null,titleElement=null,playlistElement=null;
var isPlaylistOpen=false,isLoading=false,lastUrl=null,originalSourceUrl=null;
var modes=['mode-contain','mode-cover','mode-fill','mode-original'],currentMode=2;
var currentPlaylist=[
    {title:"Video #01",src:"https://cdn.plyr.io/static/demo/View_From_A_Blue_Moon_Trailer-720p.mp4"},
    {title:"Video #02",src:"https://cdn.plyr.io/static/demo/View_From_A_Blue_Moon_Trailer-1080p.mp4"}
];
var currentSrc=currentPlaylist[0].src,currentTitle=currentPlaylist[0].title,currentIndex=0;

var errorOverlay=document.getElementById('error-overlay');
var errMsgText=document.getElementById('err-msg-text');
var errRetryBtn=document.getElementById('err-retry-btn');
var extractOverlay=document.getElementById('extract-overlay');
var extractLabelText=document.getElementById('extract-label-text');

var LIBS = {
    hls: "hls.min.js",
    shaka: "shaka-player.js"
};

function injectScript(src) {
    return new Promise(function(resolve, reject) {
        if (document.querySelector('script[src="' + src + '"]')) {
            resolve();
            return;
        }
        var s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
    });
}

function showError(msg){
    hideExtractOverlay();
    errMsgText.textContent=msg||'فشل تحميل البث';
    errorOverlay.classList.add('visible');
}
function hideError(){errorOverlay.classList.remove('visible');}
function showExtractOverlay(msg){
    extractLabelText.textContent=msg||'جاري استخراج الرابط...';
    extractOverlay.classList.add('visible');
}
function hideExtractOverlay(){extractOverlay.classList.remove('visible');}

window.showExtractionError = function(msg) {
    showError(msg);
};
window.showLoadingLoop = function() {
    showExtractOverlay('جاري استخراج الرابط...');
};
window.hideLoadingLoop = hideExtractOverlay;

errRetryBtn.addEventListener('click',function(){
    hideError();
    if (originalSourceUrl) {
        loadStream(originalSourceUrl);
    } else if (lastUrl) {
        loadStream(lastUrl);
    }
});

function detectType(url){
    var woDRM=url.split('###')[0],woHash=woDRM.split('#')[0];
    var path=woHash.split('?')[0].toLowerCase(),full=woDRM.toLowerCase();
    return{
        isHls: path.endsWith('.m3u8')||path.indexOf('.m3u8/')!==-1||full.indexOf('.m3u8')!==-1,
        isDash:path.endsWith('.mpd') ||path.indexOf('.mpd/')  !==-1||full.indexOf('.mpd')  !==-1,
        hasDRM:url.indexOf('###')!==-1
    };
}
function isFaselTarget(url){
    if(url.indexOf('##ex')!==-1)return false;
    var c=url.split('###')[0].split('?')[0].toLowerCase();
    return c.indexOf('fasel')!==-1&&c.indexOf('.m3u8')===-1&&c.indexOf('.mpd')===-1&&c.indexOf('.mp4')===-1;
}
function base64ToHex(str){
    var b64=str.replace(/-/g,'+').replace(/_/g,'/');
    while(b64.length%4!==0)b64+='=';
    try{var raw=window.atob(b64),hex='';for(var i=0;i<raw.length;i++){var h=raw.charCodeAt(i).toString(16);hex+=h.length===1?'0'+h:h;}return hex;}catch(e){return str;}
}

// دالة التحكم الديناميكي الذكي بجودة واجهة Plyr الرسومية
function updateQualityMenuUI(selectedQuality, activeAutoHeight) {
    if (!playerContainer) return;
    var items = playerContainer.querySelectorAll('[role="menuitemradio"][value]');
    items.forEach(function(item) {
        var val = item.getAttribute('value');
        if (val === String(selectedQuality)) {
            item.setAttribute('aria-checked', 'true');
        } else {
            item.setAttribute('aria-checked', 'false');
        }
    });
    var label = playerContainer.querySelector('[data-plyr="quality"] .plyr__menu__value');
    if (label) {
        if (selectedQuality === 'auto') {
            label.textContent = 'Auto' + (activeAutoHeight ? ' (' + activeAutoHeight + 'p)' : '');
        } else {
            label.textContent = selectedQuality + 'p';
        }
    }
}

// دالة فرض السرعة القياسية وتجنب بدء القيمة على صفر
var isSpeedEnforced = false;
function enforceNormalSpeed(playerInstance) {
    if (videoElement) {
        videoElement.playbackRate = 1;
    }
    if (playerInstance) {
        playerInstance.speed = 1;
    }
}

async function loadStream(url){
    if(isLoading){isLoading=false;await new Promise(function(r){setTimeout(r,80);});}
    if(videoElement){try{videoElement.pause();}catch(e){}}
    
    isLoading=true;lastUrl=url;hideError();
    isSpeedEnforced = false; // إعادة ضبط الحالة لبدء دفق جديد

    if(plyrPlayer){try{plyrPlayer.destroy();}catch(e){}plyrPlayer=null;}
    if(hlsPlayer){try{hlsPlayer.destroy();}catch(e){}hlsPlayer=null;}
    if(shakaPlayer){try{await shakaPlayer.destroy();}catch(e){}shakaPlayer=null;}

    if(url.indexOf('##ext')!==-1 || url.indexOf('##ex')!==-1 || isFaselTarget(url)){
        originalSourceUrl=url;
    }

    if(url.indexOf('##ext')!==-1){
        isLoading=false;
        showExtractOverlay('جاري استخراج الرابط...');
        var cleanUrl = url.split('##ext')[0].trim();
        if(window.AndroidBridge && typeof window.AndroidBridge.triggerPackerExtraction === 'function'){
            window.AndroidBridge.triggerPackerExtraction(cleanUrl);
        } else {
            handlePackerExtract(url);
        }
        return;
    }

    if(url.indexOf('##ex')!==-1||isFaselTarget(url)){
        isLoading=false;showExtractOverlay('جاري استخراج الرابط...');
        var cu=url.split('##ex')[0].trim();
        if(window.AndroidBridge&&window.AndroidBridge.triggerExtraction) {
            window.AndroidBridge.triggerExtraction(cu);
        }
        return;
    }

    var t=detectType(url),manifestUri=t.hasDRM?url.split('###')[0].trim():url;
    var container=document.querySelector('.video-player-container');
    container.innerHTML='<video id="player" class="raw-video" crossorigin playsinline autoplay></video>';
    videoElement=document.getElementById('player');

    if(t.isHls && !t.hasDRM) {
        try {
            await injectScript(LIBS.hls);
            if (!Hls.isSupported()) {
                throw new Error("Hls.js is not supported on this engine");
            }
            hlsPlayer = new Hls({
                enableWorker: true,
                lowLatencyMode: true,
                maxBufferLength: 4,
                maxBufferSize: 10 * 1024 * 1024,
                enableSoftwareAES: true
            });
            hlsPlayer.loadSource(manifestUri);
            hlsPlayer.attachMedia(videoElement);
            
            // ربط نظام التغيير الذاتي للجودة في Hls.js بواجهة المستخدم
            hlsPlayer.on(Hls.Events.LEVEL_SWITCHED, function(event, data) {
                if (hlsPlayer.autoLevelEnabled) {
                    var activeHeight = hlsPlayer.levels[data.level].height;
                    updateQualityMenuUI('auto', activeHeight);
                }
            });

            hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
                if(!isLoading) return;
                var availableQualities = data.levels.map(function(l) { return l.height; });
                availableQualities = availableQualities.filter(function(q, idx) { 
                    return availableQualities.indexOf(q) === idx; 
                }).sort(function(a,b){return b-a;});
                initPlyrWithHls(availableQualities);
            });
            hlsPlayer.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    showError('خطأ في معالجة البث المباشر (HLS)');
                }
            });
        } catch (err) {
            showError('فشل تهيئة محرك البث Hls.js: ' + (err?.message || err));
        }
    } 
    else if(t.isDash || t.hasDRM) {
        try {
            await injectScript(LIBS.shaka);
            shaka.polyfill.installAll();
            shakaPlayer=new shaka.Player(videoElement);
            shakaPlayer.configure({
                streaming:{bufferingGoal:8,rebufferingGoal:1.5,bufferBehind:10},
                abr: { enabled: true }
            });
            shakaPlayer.addEventListener('error',function(ev){
                if(!isLoading)return;isLoading=false;
                showError('خطأ أثناء تشغيل البث المشفر');
            });
            
            // مزامنة الجودة التلقائية لـ Shaka Player مع واجهة الرسومية
            shakaPlayer.addEventListener('adaptation', function() {
                if (shakaPlayer && shakaPlayer.getConfiguration().abr.enabled) {
                    var tracks = shakaPlayer.getVariantTracks().filter(function(tr){ return tr.active; });
                    if (tracks.length > 0) {
                        var activeHeight = tracks[0].height;
                        setTimeout(function() {
                            updateQualityMenuUI('auto', activeHeight);
                        }, 50);
                    }
                }
            });

            if(t.hasDRM){
                try{var kp=url.split('###')[1].split(':');shakaPlayer.configure({drm:{clearKeys:{[base64ToHex(kp[1].trim())]:base64ToHex(kp[0].trim())}}});}
                catch(e){showError('خطأ في مفاتيح التشفير');isLoading=false;return;}
            }
            var mimeType=t.isDash?'application/dash+xml':'application/x-mpegurl';
            await shakaPlayer.load(manifestUri,null,mimeType);
            if(!isLoading)return;
            var tracks=shakaPlayer.getVariantTracks(),heights=[],seen={};
            tracks.forEach(function(tr){if(tr.height&&!seen[tr.height]){seen[tr.height]=true;heights.push(tr.height);}});
            heights.sort(function(a,b){return b-a;});
            initPlyrWithShaka(heights);
        } catch (err) {
            showError('فشل تشغيل مشغل البث المشفر: ' + (err?.message || err));
        }
    } 
    else {
        videoElement.src=manifestUri;
        videoElement.addEventListener('error',function(){if(!isLoading)return;isLoading=false;showError('فشل تشغيل الفيديو');},{once:true});
        plyrPlayer=new Plyr(videoElement,{
            controls:['rewind','play','fast-forward','progress','current-time','mute','volume','captions','settings','pip','fullscreen'],
            seekTime:10,
            settings:['speed','captions'],
            iconUrl: 'plyr.svg',
            speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2] },
            fullscreen:{iosNative:true,video:true,container:'.plyr'},
            hideControls:true,
            clickToPlay:false
        });
        initCustomUI(plyrPlayer);
    }
}

function initPlyrWithHls(heights) {
    var plyrCfg={
        controls:['rewind','play','fast-forward','progress','current-time','mute','volume','captions','settings','pip','fullscreen'],
        settings:['quality','speed','captions'],
        iconUrl: 'plyr.svg',
        speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2] }
    };
    if(heights.length>0){
        plyrCfg.quality={
            default:'auto',
            options:['auto'].concat(heights),
            forced:true,
            onChange:function(q){
                if(q === 'auto') {
                    hlsPlayer.currentLevel = -1;
                    setTimeout(function(){ updateQualityMenuUI('auto'); }, 50);
                } else {
                    var targetLevel = hlsPlayer.levels.findIndex(function(l){ return l.height === q; });
                    if(targetLevel !== -1) {
                        hlsPlayer.currentLevel = targetLevel;
                        setTimeout(function(){ updateQualityMenuUI(q); }, 50);
                    }
                }
            }
        };
    }
    plyrPlayer=new Plyr(videoElement,plyrCfg);
    initCustomUI(plyrPlayer);
}

function initPlyrWithShaka(heights) {
    var plyrCfg={
        controls:['rewind','play','fast-forward','progress','current-time','mute','volume','captions','settings','pip','fullscreen'],
        settings:['quality','speed','captions'],
        iconUrl: 'plyr.svg',
        speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2] }
    };
    if(heights.length>0){
        plyrCfg.quality={
            default:'auto',
            options:['auto'].concat(heights),
            forced:true,
            onChange:function(q){
                if(q==='auto'){
                    shakaPlayer.configure({abr:{enabled:true}});
                    setTimeout(function(){ updateQualityMenuUI('auto'); }, 50);
                } else {
                    shakaPlayer.configure({abr:{enabled:false}});
                    var t=Number(q),f=shakaPlayer.getVariantTracks().filter(function(tr){return tr.height===t;});
                    if(f.length>0) {
                        shakaPlayer.selectVariantTrack(f.sort(function(a,b){return b.bandwidth-a.bandwidth;})[0],true);
                        setTimeout(function(){ updateQualityMenuUI(q); }, 50);
                    }
                }
            }
        };
    }
    plyrPlayer=new Plyr(videoElement,plyrCfg);
    initCustomUI(plyrPlayer);
}

function initCustomUI(playerInstance){
    playerContainer=videoElement.closest('.plyr');
    
    // مراقبة أحداث بدء التشغيل لفرض السرعة الافتراضية بنجاح وتجنب القيمة صفر
    playerInstance.on('ready',function(){
        videoElement.classList.remove('raw-video');
        playerContainer.classList.add(modes[currentMode]);
        var fsBtn=playerContainer.querySelector('[data-plyr="fullscreen"]');
        if(fsBtn){
            var nb=fsBtn.cloneNode(true);fsBtn.parentNode.replaceChild(nb,fsBtn);
            nb.addEventListener('click',function(e){
                e.preventDefault();e.stopPropagation();
                playerContainer.classList.remove(modes[currentMode]);
                currentMode=(currentMode+1)%modes.length;
                playerContainer.classList.add(modes[currentMode]);
                var lm={'mode-contain':'Contain','mode-cover':'Cover','mode-fill':'Stretch / Fill','mode-original':'Original Size'};
                nb.setAttribute('aria-label',lm[modes[currentMode]]);
            });
        }
        
        enforceNormalSpeed(playerInstance);
        playerInstance.play();
        isLoading=false;
        
        setTimeout(function() { updateQualityMenuUI('auto'); }, 300);
        hideExtractOverlay();
    });

    playerInstance.on('play', function() {
        if (!isSpeedEnforced) {
            enforceNormalSpeed(playerInstance);
            isSpeedEnforced = true;
        }
    });

    playerInstance.on('playing', function() {
        hideExtractOverlay();
        if (!isSpeedEnforced) {
            enforceNormalSpeed(playerInstance);
            isSpeedEnforced = true;
        }
        
        // التحقق من الجودة المتكيفة النشطة فور رندرة إطارات الفيديو الأولى
        if (hlsPlayer && hlsPlayer.autoLevelEnabled) {
            var activeHeight = hlsPlayer.levels[hlsPlayer.currentLevel]?.height;
            updateQualityMenuUI('auto', activeHeight);
        } else if (shakaPlayer && shakaPlayer.getConfiguration().abr.enabled) {
            var tracks = shakaPlayer.getVariantTracks().filter(function(tr){ return tr.active; });
            if (tracks.length > 0) {
                updateQualityMenuUI('auto', tracks[0].height);
            }
        } else {
            setTimeout(function() { updateQualityMenuUI('auto'); }, 50);
        }
    });

    var oldT=playerContainer.querySelector('.plyr__title');if(oldT)oldT.remove();
    var oldP=playerContainer.querySelector('.plyr__playlist');if(oldP)oldP.remove();

    titleElement=document.createElement('div');
    titleElement.className='plyr__title';
    titleElement.innerHTML=currentTitle+' <span>\uD83D\uDC4D</span>';
    playerContainer.appendChild(titleElement);

    playlistElement=document.createElement('div');
    playlistElement.className='plyr__playlist';
    var items='';
    currentPlaylist.forEach(function(video,idx){
        items+='<div class="playlist-item'+(idx===currentIndex?' active':'')+'" data-src="'+video.src+'" data-idx="'+idx+'">'+video.title+'</div>';
    });
    playlistElement.innerHTML='<div class="playlist-wrapper">'+items+'</div>';
    playerContainer.appendChild(playlistElement);

    playlistElement.querySelectorAll('.playlist-item').forEach(function(item){
        item.addEventListener('click',function(e){
            e.stopPropagation();
            currentIndex=parseInt(item.getAttribute('data-idx'),10);
            currentSrc=item.getAttribute('data-src');
            currentTitle=item.textContent.trim();
            loadStream(currentSrc);
        });
    });

    titleElement.addEventListener('click',function(e){
        e.stopPropagation();isPlaylistOpen=!isPlaylistOpen;
        playerContainer.classList.toggle('playlist-open',isPlaylistOpen);
    });

    playerInstance.on('controlsshown',function(){playerContainer.classList.add('plyr--controls-visible');});
    playerInstance.on('controlshidden',function(){playerContainer.classList.remove('plyr--controls-visible','playlist-open');isPlaylistOpen=false;});
}

window.playExtractedUrl=function(url){
    showExtractOverlay('جارٍ الاتصال بالبث...');
    loadStream(url);
};

window.loadBase64Playlist=function(base64Str){
    try{
        var bin=atob(base64Str),escaped=bin.split('').map(function(c){return'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2);}).join('');
        var data=JSON.parse(decodeURIComponent(escaped));
        if(Array.isArray(data)&&data.length>0){currentIndex=0;currentPlaylist=data;currentSrc=data[0].src;currentTitle=data[0].title||'فيديو';loadStream(currentSrc);}
    }catch(e){showError('خطأ في قراءة بيانات القائمة');}
};

document.addEventListener('DOMContentLoaded',function(){
    var p=new URLSearchParams(window.location.search);
    if(p.get('deeplink')!=='true')loadStream(currentSrc);
});
</script>
